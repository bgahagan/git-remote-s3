name: Rust

on: [push]

jobs:
  build:
    
    services:
      minio:
        image: minio/minio
        ports:
          - 9001:9000
        env:
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: test1234
          MINIO_DOMAIN: localhost
        command: server /home/shared
    
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v1
    - name: Test
      run: RUST_BACKTRACE=1 cargo test --verbose
